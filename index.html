<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANBO OS — Investment Intelligence</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e1a;--panel:rgba(12,18,36,0.85);--border:rgba(0,200,220,0.2);
--cyan:#00c8dc;--teal:#0af0e0;--amber:#f0a030;--red:#ff4060;--green:#00e87b;
--purple:#a855f7;--blue:#3b82f6;--text:#c8d6e5;--text-dim:#5a6a80;
--glass:rgba(15,25,50,0.7);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw}
.mono{font-family:'JetBrains Mono','Fira Code','Consolas',monospace}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,220,0.015) 2px,rgba(0,200,220,0.015) 4px)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.4) 100%)}
#grid-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.03;
background-image:linear-gradient(var(--cyan) 1px,transparent 1px),linear-gradient(90deg,var(--cyan) 1px,transparent 1px);
background-size:60px 60px}
.dashboard{display:grid;grid-template-rows:48px 1fr 56px;grid-template-columns:260px 1fr 280px;height:100vh;width:100vw;gap:0}
.topbar{grid-column:1/-1;grid-row:1}
.left{grid-column:1;grid-row:2;overflow-y:auto}
.center{grid-column:2;grid-row:2;display:flex;flex-direction:column;overflow:hidden}
.right{grid-column:3;grid-row:2;overflow-y:auto}
.bottom{grid-column:1/-1;grid-row:3}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel{background:var(--glass);border:1px solid var(--border);position:relative;padding:12px;margin:4px;backdrop-filter:blur(12px)}
.panel::before,.panel::after{content:'';position:absolute;width:12px;height:12px;border-color:var(--cyan);border-style:solid;pointer-events:none}
.panel::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.panel::after{top:-1px;right:-1px;border-width:2px 2px 0 0}
.panel .corner-bl,.panel .corner-br{position:absolute;width:12px;height:12px;border-color:var(--cyan);border-style:solid;pointer-events:none;bottom:-1px}
.panel .corner-bl{left:-1px;border-width:0 0 2px 2px}.panel .corner-br{right:-1px;border-width:0 2px 2px 0}
.panel-title{font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.panel-title::before{content:'◆';font-size:6px}
.topbar{display:flex;align-items:center;padding:0 16px;background:rgba(8,12,28,0.95);border-bottom:1px solid var(--border);z-index:100}
.logo{font-family:'JetBrains Mono','Fira Code',monospace;font-size:18px;font-weight:700;color:var(--cyan);letter-spacing:4px;text-shadow:0 0 20px rgba(0,200,220,0.5)}
.logo span{color:var(--text-dim);font-weight:400;font-size:12px;margin-left:8px;letter-spacing:1px}
.system-status{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:11px;color:var(--green)}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px var(--green)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.clock{font-family:monospace;font-size:13px;color:var(--teal);margin-left:16px}
.search-box{margin:0 auto;background:rgba(0,200,220,0.05);border:1px solid var(--border);padding:6px 16px;border-radius:2px;width:300px}
.search-box input{background:none;border:none;color:var(--text);font-size:12px;width:100%;outline:none;text-align:center;font-family:monospace}
.search-box input::placeholder{color:var(--text-dim)}
.fund-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,200,220,0.08)}
.fund-item:last-child{border-bottom:none}
.gauge-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
.gauge-bg{fill:none;stroke:rgba(0,200,220,0.1);stroke-width:4}
.gauge-fill{fill:none;stroke-width:4;stroke-linecap:round}
.fund-info{flex:1;min-width:0}
.fund-name{font-size:11px;font-weight:600;color:#e0e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fund-metrics{display:flex;gap:8px;font-size:9px;margin-top:2px}
.fund-metrics span{font-family:monospace}
.metric-label{color:var(--text-dim)}
.irr-good{color:var(--green)}.irr-mid{color:var(--amber)}.irr-low{color:var(--red)}
.alert-item{font-size:10px;padding:4px 0;border-bottom:1px solid rgba(0,200,220,0.05);display:flex;gap:6px;align-items:flex-start}
.alert-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px}
.alert-time{color:var(--text-dim);font-family:monospace;flex-shrink:0;font-size:9px}
#map-container{flex:1;position:relative;min-height:0}
#world-map{width:100%;height:100%}
.map-dot{animation:mapPulse 3s ease-in-out infinite}
@keyframes mapPulse{0%,100%{opacity:0.9}50%{opacity:0.4}}
.hub-label{font-size:9px;fill:var(--text-dim);font-family:monospace;text-anchor:middle}
.connection-line{stroke:rgba(0,200,220,0.1);stroke-width:0.5;fill:none}
.agents-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.agent-card{background:rgba(0,200,220,0.03);border:1px solid rgba(0,200,220,0.1);padding:8px 10px;position:relative;overflow:hidden}
.agent-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3}
.agent-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.agent-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.agent-dot.active{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.agent-dot.processing{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse 1.5s infinite}
.agent-name{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--cyan)}
.agent-role{font-size:8px;color:var(--text-dim);margin-bottom:3px}
.agent-status{font-size:8px;font-family:monospace;color:var(--teal);min-height:12px;transition:opacity 0.4s}
.agent-sparkline{margin-top:3px;height:14px}
.agent-sparkline path{fill:none;stroke:var(--cyan);stroke-width:1;opacity:0.5}
.pipeline-stage{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:10px;border-bottom:1px solid rgba(0,200,220,0.05)}
.pipeline-bar{height:4px;background:var(--cyan);border-radius:2px;opacity:0.7}
.pipeline-count{font-family:monospace;color:var(--teal);font-size:11px;font-weight:600}
.heatmap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.heat-cell{padding:6px 4px;text-align:center;font-size:9px;font-family:monospace;border-radius:1px}
.heat-cell .pct{font-size:11px;font-weight:700;display:block}
.signal-item{font-size:10px;padding:5px 0;border-bottom:1px solid rgba(0,200,220,0.05);display:flex;gap:4px}
.bottom{background:rgba(8,12,28,0.95);border-top:1px solid var(--border);display:flex;align-items:center;overflow:hidden;padding:0 16px}
.ticker-wrap{display:flex;animation:tickscroll 40s linear infinite;white-space:nowrap}
@keyframes tickscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:8px;padding:0 24px;font-size:11px;font-family:monospace}
.ticker-label{color:var(--text-dim);font-size:9px;text-transform:uppercase;letter-spacing:1px}
.ticker-value{color:var(--teal);font-weight:600;font-size:14px}
.ticker-spark{width:60px;height:20px}
.ticker-spark path{fill:none;stroke:var(--cyan);stroke-width:1.5}
.ticker-divider{color:var(--border);padding:0 8px}
</style>
</head>
<body>
<div id="grid-overlay"></div>
<div class="dashboard">
<div class="topbar">
<div class="logo">SANBO OS<span>v3.1.4</span></div>
<div class="search-box"><input type="text" placeholder="⌘ SEARCH DEALS, FUNDS, COMPANIES..."></div>
<div class="system-status"><div class="pulse-dot"></div>SYSTEM ACTIVE</div>
<div class="clock mono" id="clock"></div>
</div>
<div class="left">
<div class="panel" id="fund-panel"><div class="corner-bl"></div><div class="corner-br"></div><div class="panel-title">Fund Command Center</div><div id="fund-list"></div></div>
<div class="panel" id="alert-panel"><div class="corner-bl"></div><div class="corner-br"></div><div class="panel-title">Alert Feed</div><div id="alert-feed"></div></div>
</div>
<div class="center">
<div class="panel" style="flex:1;display:flex;flex-direction:column;margin-bottom:0"><div class="corner-bl"></div><div class="corner-br"></div><div class="panel-title">Global Deal Flow — Live Intelligence Map</div><div id="map-container"><svg id="world-map"></svg></div></div>
<div class="panel" style="margin-top:0" id="agents-panel"><div class="corner-bl"></div><div class="corner-br"></div><div class="panel-title">◈ Live AI Workflow Agents</div><div class="agents-grid" id="agents-grid"></div></div>
</div>
<div class="right">
<div class="panel"><div class="corner-bl"></div><div class="corner-br"></div><div class="panel-title">Deal Pipeline</div><div id="pipeline"></div></div>
<div class="panel"><div class="corner-bl"></div><div class="corner-br"></div><div class="panel-title">Sector Heatmap</div><div class="heatmap-grid" id="heatmap"></div></div>
<div class="panel"><div class="corner-bl"></div><div class="corner-br"></div><div class="panel-title">Market Signals</div><div id="signals"></div></div>
</div>
<div class="bottom"><div class="ticker-wrap" id="ticker"></div></div>
</div>
<script>
function updateClock(){const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('en-US',{hour12:false})+' JST'}
setInterval(updateClock,1000);updateClock();

const funds=[
{name:'Apex Fund I',deployed:78,irr:28.4,tvpi:2.8,aum:420},
{name:'Nova Ventures II',deployed:62,irr:34.1,tvpi:3.2,aum:380},
{name:'Meridian Capital',deployed:91,irr:12.3,tvpi:1.6,aum:550},
{name:'Horizon Partners',deployed:45,irr:41.2,tvpi:3.8,aum:290},
{name:'Zenith Growth',deployed:83,irr:22.7,tvpi:2.4,aum:310},
{name:'Stellar Capital',deployed:56,irr:18.9,tvpi:2.1,aum:480},
{name:'Vanguard Select',deployed:71,irr:31.5,tvpi:3.0,aum:260},
{name:'Phoenix Rising',deployed:38,irr:0,tvpi:1.0,aum:200}
];

const alerts=[
{type:'red',text:'Burn rate alert: Solaris AI exceeding 22%',time:'2m'},
{type:'green',text:'NovaTech Series B closed — $45M at $320M',time:'8m'},
{type:'amber',text:'LP capital call deadline: Apex Fund — 48h',time:'15m'},
{type:'cyan',text:'New deal sourced: QuantumLeap (AI/Infra)',time:'22m'},
{type:'green',text:'Exit: AquaPure acquired by Veolia — 4.2x',time:'1h'},
{type:'amber',text:'Board meeting: Meridian Health — tomorrow',time:'1h'},
{type:'red',text:'Market signal: AI multiples compressing',time:'2h'},
{type:'cyan',text:'LP portal: 23 new views from Sovereign Wealth',time:'3h'},
{type:'green',text:'Due diligence complete: CloudForge — PASS',time:'4h'},
{type:'amber',text:'Follow-on decision needed: Helio Energy',time:'5h'},
];

const agents=[
{name:'DEAL SCOUT',role:'Scanning startups',msgs:['Analyzing Series A climate tech — 3 matches','Processing 847 new listings from AngelList','Cross-referencing founder networks']},
{name:'DUE DILIGENCE',role:'Automated DD',msgs:['Financials review: NovaTech — 340% YoY','Cap table analysis: Meridian Health','Reference checks: 4/6 completed']},
{name:'LP RELATIONS',role:'LP comms',msgs:['Q4 report generated for Apex Fund','Capital call notice: $12M Series B co-invest','LP portal updated — 23 views today']},
{name:'MARKET INTEL',role:'Market surveillance',msgs:['AI sector multiples compressing — 2.1x','IPO pipeline: 3 SPAC targets identified','Competitor fund raising alert: Nova $500M']},
{name:'PORTFOLIO OPS',role:'Portfolio health',msgs:['Flag: burn rate exceeding projections 22%','Board deck auto-generated for 4 companies','KPI dashboard refreshed — 12 updates']},
{name:'RISK ENGINE',role:'Risk modeling',msgs:['Monte Carlo sim: 95th %ile TVPI 3.2x','Concentration risk: 34% in AI sector','Vintage year analysis updated']},
{name:'EXIT STRATEGY',role:'Exit tracking',msgs:['IPO window opening for fintech','M&A comp analysis: 3 portfolio cos eligible','Secondary market bid: $45M for stake']},
{name:'CELEBRITY MATCH',role:'LP matching',msgs:['New prospect scored 94% alignment','Outreach sequence: 3 warm intros pending','Brand synergy analysis complete']}
];

const pipeline=[
{stage:'Sourced',count:124,pct:100},{stage:'Screening',count:47,pct:38},{stage:'Deep Dive',count:18,pct:15},
{stage:'IC Review',count:8,pct:6},{stage:'Term Sheet',count:4,pct:3},{stage:'Closed',count:2,pct:2}
];

const sectors=[
{name:'AI/ML',pct:34,heat:0.9},{name:'Fintech',pct:18,heat:0.6},{name:'Health',pct:14,heat:0.5},
{name:'Climate',pct:12,heat:0.7},{name:'Space',pct:8,heat:0.4},{name:'Consumer',pct:6,heat:0.3},
{name:'Cyber',pct:4,heat:0.55},{name:'Web3',pct:2,heat:0.2},{name:'Infra',pct:2,heat:0.35}
];

const signals=[
{icon:'▲',color:'var(--green)',text:'S&P 500 +1.2% — risk appetite up'},
{icon:'▼',color:'var(--red)',text:'AI sector multiples: 12.4x → 10.1x'},
{icon:'◆',color:'var(--amber)',text:'Fed rate decision Wed — hold expected'},
{icon:'▲',color:'var(--green)',text:'Climate VC funding +28% QoQ'},
{icon:'●',color:'var(--cyan)',text:'IPO window: 3 fintech SPACs filing'},
{icon:'▼',color:'var(--red)',text:'Crypto markets -8% weekly'},
{icon:'▲',color:'var(--green)',text:'Space sector deal flow +45% YoY'},
];

// Render funds
const fundList=document.getElementById('fund-list');
funds.forEach(f=>{
const c=f.irr>30?'irr-good':f.irr>15?'irr-mid':'irr-low';
const circ=2*Math.PI*18;const offset=circ*(1-f.deployed/100);
const sc=f.deployed>80?'var(--amber)':f.deployed>60?'var(--cyan)':'var(--green)';
fundList.innerHTML+=`<div class="fund-item"><div class="gauge-wrap"><svg viewBox="0 0 44 44"><circle class="gauge-bg" cx="22" cy="22" r="18"/><circle class="gauge-fill" cx="22" cy="22" r="18" stroke="${sc}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 22 22)"/><text x="22" y="24" text-anchor="middle" fill="var(--text)" font-size="10" font-family="monospace">${f.deployed}%</text></svg></div><div class="fund-info"><div class="fund-name">${f.name}</div><div class="fund-metrics"><span><span class="metric-label">IRR </span><span class="${c}">${f.irr}%</span></span><span><span class="metric-label">TVPI </span>${f.tvpi}x</span><span><span class="metric-label">AUM </span>$${f.aum}M</span></div></div></div>`;
});

// Alerts
const alertFeed=document.getElementById('alert-feed');
alerts.forEach(a=>{alertFeed.innerHTML+=`<div class="alert-item"><div class="alert-dot" style="background:var(--${a.type})"></div><span class="alert-time">${a.time}</span><span>${a.text}</span></div>`;});

// Pipeline
const pipelineEl=document.getElementById('pipeline');
pipeline.forEach(p=>{pipelineEl.innerHTML+=`<div class="pipeline-stage"><span style="color:var(--text-dim);width:70px">${p.stage}</span><div style="flex:1;margin:0 8px;background:rgba(0,200,220,0.1);height:4px;border-radius:2px"><div class="pipeline-bar" style="width:${p.pct}%"></div></div><span class="pipeline-count">${p.count}</span></div>`;});

// Heatmap
const heatmapEl=document.getElementById('heatmap');
sectors.forEach(s=>{
const bg=s.heat>0.6?`rgba(0,232,123,${s.heat*0.3})`:`rgba(0,200,220,${s.heat*0.3})`;
const bc=s.heat>0.6?`rgba(0,232,123,0.3)`:`rgba(0,200,220,0.2)`;
const tc=s.heat>0.6?'var(--green)':s.heat>0.4?'var(--amber)':'var(--text-dim)';
heatmapEl.innerHTML+=`<div class="heat-cell" style="background:${bg};border:1px solid ${bc}"><span class="pct" style="color:${tc}">${s.pct}%</span>${s.name}</div>`;
});

// Signals
const signalsEl=document.getElementById('signals');
signals.forEach(s=>{signalsEl.innerHTML+=`<div class="signal-item"><span style="color:${s.color}">${s.icon}</span><span>${s.text}</span></div>`;});

// Agents
function mkSparkline(){
const pts=Array.from({length:12},()=>Math.random());
const x=d3.scaleLinear().domain([0,11]).range([0,120]);
const y=d3.scaleLinear().domain([0,1]).range([12,2]);
return `<svg class="agent-sparkline" viewBox="0 0 120 14" preserveAspectRatio="none"><path d="${d3.line().x((_,i)=>x(i)).y(d=>y(d)).curve(d3.curveBasis)(pts)}"/></svg>`;
}
const agentsGrid=document.getElementById('agents-grid');
agents.forEach((a,i)=>{
const cls=i%3===1?'processing':'active';
agentsGrid.innerHTML+=`<div class="agent-card" id="agent-${i}"><div class="agent-header"><div class="agent-dot ${cls}"></div><div class="agent-name">${a.name}</div></div><div class="agent-role">${a.role}</div><div class="agent-status mono" id="as-${i}">${a.msgs[0]}</div>${mkSparkline()}</div>`;
});
agents.forEach((a,i)=>{
let idx=0;const iv=3000+Math.random()*2000;
setInterval(()=>{
idx=(idx+1)%a.msgs.length;
const el=document.getElementById('as-'+i);
el.style.opacity='0';
setTimeout(()=>{el.textContent=a.msgs[idx];el.style.opacity='1'},400);
const dot=document.querySelector('#agent-'+i+' .agent-dot');
dot.className='agent-dot '+(Math.random()>0.3?'active':'processing');
},iv);
});

// Map
const mapSvg=d3.select('#world-map');
const mapC=document.getElementById('map-container');
function drawMap(){
const W=mapC.clientWidth,H=mapC.clientHeight;
mapSvg.attr('viewBox',`0 0 ${W} ${H}`).selectAll('*').remove();
const proj=d3.geoNaturalEarth1().fitSize([W-40,H-40],[{type:'Sphere'}]).translate([W/2,H/2]);
const path=d3.geoPath(proj);
mapSvg.append('path').datum(d3.geoGraticule().step([30,30])()).attr('d',path).attr('fill','none').attr('stroke','rgba(0,200,220,0.06)').attr('stroke-width',0.5);
mapSvg.append('path').datum({type:'Sphere'}).attr('d',path).attr('fill','none').attr('stroke','rgba(0,200,220,0.15)').attr('stroke-width',1);

const hubs=[
{name:'SF',lat:37.77,lng:-122.42,deals:28,color:'#00e87b'},
{name:'NYC',lat:40.71,lng:-74.01,deals:22,color:'#3b82f6'},
{name:'London',lat:51.51,lng:-0.13,deals:18,color:'#3b82f6'},
{name:'Tokyo',lat:35.68,lng:139.69,deals:15,color:'#a855f7'},
{name:'Singapore',lat:1.35,lng:103.82,deals:12,color:'#00c8dc'},
{name:'Berlin',lat:52.52,lng:13.40,deals:8,color:'#00e87b'},
{name:'Tel Aviv',lat:32.07,lng:34.78,deals:10,color:'#00e87b'},
{name:'São Paulo',lat:-23.55,lng:-46.63,deals:6,color:'#00e87b'},
{name:'Mumbai',lat:19.08,lng:72.88,deals:9,color:'#f0a030'},
{name:'Shanghai',lat:31.23,lng:121.47,deals:11,color:'#a855f7'},
];
const stgC={seed:'#00e87b',seriesB:'#3b82f6',late:'#a855f7',exit:'#ff4060'};
const deals=[];
for(let i=0;i<60;i++){const h=hubs[Math.floor(Math.random()*hubs.length)];deals.push({lat:h.lat+(Math.random()-0.5)*20,lng:h.lng+(Math.random()-0.5)*30,stage:['seed','seriesB','late','exit'][Math.floor(Math.random()*4)]});}
const conns=[[0,1],[0,3],[1,2],[2,4],[3,4],[2,6],[1,7],[4,9],[3,9],[2,8]];
conns.forEach(([a,b])=>{
const pa=proj([hubs[a].lng,hubs[a].lat]),pb=proj([hubs[b].lng,hubs[b].lat]);
if(pa&&pb){const mid=[(pa[0]+pb[0])/2,(pa[1]+pb[1])/2-20];
const p=mapSvg.append('path').attr('d',`M${pa[0]},${pa[1]} Q${mid[0]},${mid[1]} ${pb[0]},${pb[1]}`).attr('class','connection-line').attr('stroke-dasharray','4,4');
p.append('animate').attr('attributeName','stroke-dashoffset').attr('values','0;-8').attr('dur','2s').attr('repeatCount','indefinite');}
});
deals.forEach(d=>{const p=proj([d.lng,d.lat]);if(p)mapSvg.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',2+Math.random()*2).attr('fill',stgC[d.stage]).attr('opacity',0.6).attr('class','map-dot').style('animation-delay',Math.random()*3+'s');});
hubs.forEach(h=>{const p=proj([h.lng,h.lat]);if(p){
mapSvg.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',12).attr('fill',h.color).attr('opacity',0.08);
mapSvg.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',6).attr('fill',h.color).attr('opacity',0.15).attr('class','map-dot');
mapSvg.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',3).attr('fill',h.color).attr('opacity',0.9);
mapSvg.append('text').attr('x',p[0]).attr('y',p[1]-14).attr('class','hub-label').text(`${h.name} (${h.deals})`);
}});
const leg=mapSvg.append('g').attr('transform',`translate(${W-120},${H-60})`);
[['Seed','#00e87b'],['Series B/C','#3b82f6'],['Late Stage','#a855f7'],['Exit','#ff4060']].forEach(([l,c],i)=>{
leg.append('circle').attr('cx',0).attr('cy',i*14).attr('r',3).attr('fill',c);
leg.append('text').attr('x',10).attr('y',i*14+3).attr('fill','#5a6a80').attr('font-size',8).attr('font-family','monospace').text(l);
});
}
drawMap();window.addEventListener('resize',drawMap);

const tickerData=[
{label:'Total AUM',value:'$2.89B',spark:1},{label:'Deals Closed YTD',value:'47'},
{label:'Avg Check Size',value:'$8.2M',spark:1},{label:'Portfolio Cos',value:'142'},
{label:'Active Funds',value:'8'},{label:'Gross TVPI',value:'2.6x',spark:1},
{label:'Net IRR',value:'24.8%'},{label:'DPI',value:'0.8x'},
{label:'Dry Powder',value:'$640M',spark:1},{label:'Co-Investments',value:'23'},
{label:'LPs',value:'84'},{label:'Sectors',value:'9'},
];
function genSpark(){const pts=Array.from({length:10},()=>Math.random());const x=d3.scaleLinear().domain([0,9]).range([0,60]);const y=d3.scaleLinear().domain([0,1]).range([18,2]);return `<svg class="ticker-spark" viewBox="0 0 60 20" preserveAspectRatio="none"><path d="${d3.line().x((_,i)=>x(i)).y(d=>y(d)).curve(d3.curveBasis)(pts)}"/></svg>`;}
const ticker=document.getElementById('ticker');let th='';
for(let r=0;r<2;r++){tickerData.forEach((t,i)=>{th+=`<div class="ticker-item"><span class="ticker-label">${t.label}</span><span class="ticker-value">${t.value}</span>${t.spark?genSpark():''}</div>`;if(i<tickerData.length-1)th+=`<span class="ticker-divider">│</span>`;});if(r===0)th+=`<span class="ticker-divider" style="padding:0 40px">│</span>`;}
ticker.innerHTML=th;
