<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANBO OS — Autonomous Investment Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;600;700&display=swap');
:root{
--bg:#0a0e1a;--cyan:#00e5ff;--teal:#00bcd4;--purple:#b388ff;
--pink:#ff4081;--green:#69f0ae;--orange:#ffab40;--red:#ff5252;
--gold:#ffd740;--blue:#448aff;--grid:rgba(0,229,255,.06);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#e0e0e0;font-family:'Inter',sans-serif}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.15}100%{opacity:var(--o,1)}}
#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,229,255,.15);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;font-family:'JetBrains Mono',monospace}
#topbar .logo{display:flex;align-items:center;gap:10px}
#topbar .logo h1{font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
#topbar .logo .sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase}
#topbar .metrics{display:flex;gap:20px;font-size:11px;color:rgba(255,255,255,.5)}
#topbar .metrics span{display:flex;align-items:center;gap:5px}
#topbar .metrics .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:.4;box-shadow:none}}
#topbar .clock{font-size:13px;color:var(--cyan);font-weight:500}
#city-wrap{position:fixed;top:48px;left:0;right:0;bottom:100px;overflow:hidden;z-index:1}
#city{position:absolute;width:2000px;height:1400px;left:50%;top:50%;transform:translate(-50%,-50%)}
.building{position:absolute;cursor:pointer;transition:filter .3s,transform .3s}
.building:hover{filter:brightness(1.3) drop-shadow(0 0 20px var(--glow,var(--cyan)));transform:scale(1.04);z-index:50}
.building .label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.6);white-space:nowrap;text-transform:uppercase;text-align:center;pointer-events:none}
.building .stats{position:absolute;top:-40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid var(--glow,var(--cyan));border-radius:6px;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--glow,var(--cyan));white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;z-index:60}
.building:hover .stats{opacity:1}
.iso-bldg{filter:drop-shadow(0 4px 24px rgba(0,0,0,.5))}
.path-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.2;transform-origin:left center;animation:path-glow 4s ease-in-out infinite alternate}
@keyframes path-glow{0%{opacity:.1}100%{opacity:.35}}
.agent{position:absolute;z-index:40;pointer-events:all;cursor:pointer}
.agent-body{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 12px var(--agent-color,var(--cyan));border:2px solid var(--agent-color,var(--cyan));background:rgba(10,14,26,.8);position:relative}
.agent-name{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--agent-color,var(--cyan));white-space:nowrap;letter-spacing:1px;text-transform:uppercase;opacity:.8}
.agent .bubble{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid var(--agent-color,var(--cyan));border-radius:8px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#e0e0e0;white-space:nowrap;opacity:0;transition:opacity .4s;pointer-events:none;max-width:280px;overflow:hidden;text-overflow:ellipsis}
.agent .bubble.active{opacity:1}
.agent .bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--agent-color,var(--cyan))}
.agent:hover .task-queue{opacity:1;pointer-events:auto}
.task-queue{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.95);border:1px solid var(--agent-color,var(--cyan));border-radius:8px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#e0e0e0;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;z-index:70;min-width:220px}
.task-queue .tq-title{color:var(--agent-color,var(--cyan));font-weight:700;margin-bottom:4px;font-size:10px}
.task-queue .tq-item{padding:2px 0;opacity:.7}
.task-queue .tq-item::before{content:'▸ ';color:var(--agent-color,var(--cyan))}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--cyan);opacity:.6;pointer-events:none;z-index:5}
.drone{position:absolute;z-index:35;pointer-events:none}
.drone-body{width:12px;height:12px;background:var(--purple);border-radius:2px;transform:rotate(45deg);box-shadow:0 0 8px var(--purple);opacity:.7}
#holo{position:absolute;z-index:45;pointer-events:none;text-align:center;font-family:'JetBrains Mono',monospace}
#holo .holo-ring{width:120px;height:40px;border:1px solid rgba(0,229,255,.3);border-radius:50%;margin:0 auto;animation:holo-spin 8s linear infinite}
@keyframes holo-spin{0%{transform:rotateX(60deg) rotateZ(0deg)}100%{transform:rotateX(60deg) rotateZ(360deg)}}
#holo .holo-text{font-size:11px;color:var(--cyan);text-shadow:0 0 10px var(--cyan);margin-top:-20px}
#holo .holo-val{font-size:20px;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#bottom{position:fixed;bottom:0;left:0;right:0;height:100px;background:rgba(10,14,26,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,229,255,.12);display:flex;z-index:100;font-family:'JetBrains Mono',monospace}
#activity-log{flex:1;padding:10px 20px;overflow:hidden;position:relative}
#activity-log h3{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:6px}
#log-entries{overflow:hidden;height:65px}
.log-entry{font-size:10px;color:rgba(255,255,255,.5);padding:2px 0;animation:log-slide .5s ease-out}
.log-entry .log-time{color:var(--cyan);margin-right:8px}
.log-entry .log-agent{color:var(--green);margin-right:4px}
@keyframes log-slide{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
#fund-metrics{width:360px;padding:10px 20px;border-left:1px solid rgba(0,229,255,.1);display:flex;flex-direction:column;justify-content:center;gap:6px}
.metric-row{display:flex;justify-content:space-between;align-items:center}
.metric-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase}
.metric-value{font-size:14px;font-weight:700;color:var(--cyan)}
.metric-value.gold{color:var(--gold)}
.metric-value.green{color:var(--green)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center}
#overlay.show{display:flex}
#overlay-card{background:rgba(15,20,35,.98);border:1px solid var(--cyan);border-radius:12px;padding:30px;max-width:500px;width:90%;position:relative}
#overlay-card .close-btn{position:absolute;top:12px;right:16px;font-size:18px;color:rgba(255,255,255,.4);cursor:pointer;background:none;border:none;font-family:inherit}
#overlay-card .close-btn:hover{color:#fff}
#overlay-card h2{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--cyan);letter-spacing:2px;margin-bottom:12px}
#overlay-card .detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
#overlay-card .detail-label{color:rgba(255,255,255,.4)}
#overlay-card .detail-val{color:var(--cyan);font-weight:600}
</style>
</head>
<body>
<div id="stars"></div>
<div id="topbar">
  <div class="logo"><div><h1>SANBO OS</h1><div class="sub">Autonomous Investment Intelligence</div></div></div>
  <div class="metrics"><span><span class="dot"></span> 8 AGENTS ACTIVE</span><span>• <span id="task-count">127</span> TASKS TODAY</span><span>• 99.7% UPTIME</span></div>
  <div class="clock" id="clock"></div>
</div>
<div id="city-wrap"><div id="city"><canvas id="iso-grid" width="2000" height="1400"></canvas></div></div>
<div id="bottom">
  <div id="activity-log"><h3>Activity Log</h3><div id="log-entries"></div></div>
  <div id="fund-metrics">
    <div class="metric-row"><span class="metric-label">Total AUM</span><span class="metric-value gold">$2.4B</span></div>
    <div class="metric-row"><span class="metric-label">Active Deals</span><span class="metric-value">23</span></div>
    <div class="metric-row"><span class="metric-label">Portfolio Cos</span><span class="metric-value green">67</span></div>
    <div class="metric-row"><span class="metric-label">IRR (Net)</span><span class="metric-value gold">28.4%</span></div>
  </div>
</div>
<div id="overlay" onclick="if(event.target===this)closeOverlay()">
  <div id="overlay-card">
    <button class="close-btn" onclick="closeOverlay()">✕</button>
    <h2 id="overlay-title"></h2>
    <div id="overlay-body"></div>
  </div>
</div>
<script>
const BUILDINGS=[
  {id:'deal-tower',name:'DEAL TOWER',x:950,y:320,w:130,h:180,color:'#00e5ff',glow:'#00e5ff',icon:'🏢',stats:'Deals Sourced: 847 | Pipeline: $2.1B',details:[['Deals This Week','12'],['Pipeline Value','$2.1B'],['Conversion Rate','3.2%'],['Avg Deal Size','$8.4M']]},
  {id:'dd-lab',name:'DUE DILIGENCE LAB',x:680,y:260,w:120,h:140,color:'#b388ff',glow:'#b388ff',icon:'🔬',stats:'Reports: 34 Active | Flags: 7',details:[['Active Reports','34'],['Red Flags','7'],['Avg Completion','4.2 days'],['Reference Checks','156']]},
  {id:'lp-lounge',name:'LP LOUNGE',x:1200,y:300,w:120,h:130,color:'#ff4081',glow:'#ff4081',icon:'🏛️',stats:'LPs: 42 | Capital Committed: $890M',details:[['Active LPs','42'],['Capital Committed','$890M'],['Pending Calls','$45M'],['NPS Score','92']]},
  {id:'market-watch',name:'MARKET WATCH',x:500,y:420,w:130,h:130,color:'#ffab40',glow:'#ffab40',icon:'📡',stats:'Signals: 1.2K/day | Alerts: 8 Active',details:[['Daily Signals','1,247'],['Active Alerts','8'],['Markets Tracked','34'],['Data Sources','89']]},
  {id:'portfolio-hq',name:'PORTFOLIO HQ',x:1100,y:520,w:130,h:140,color:'#69f0ae',glow:'#69f0ae',icon:'📊',stats:'Companies: 67 | Avg Growth: 142%',details:[['Portfolio Cos','67'],['Avg Revenue Growth','142%'],['Board Seats','23'],['Follow-on Rate','68%']]},
  {id:'risk-vault',name:'RISK VAULT',x:600,y:600,w:110,h:110,color:'#ff5252',glow:'#ff5252',icon:'🔒',stats:'Risk Score: 7.2/10 | Simulations: 12K',details:[['Risk Score','7.2/10'],['Monte Carlo Runs','12,847'],['Stress Tests','34'],['VaR (95%)','$142M']]},
  {id:'exit-gateway',name:'EXIT GATEWAY',x:1300,y:600,w:120,h:120,color:'#ffd740',glow:'#ffd740',icon:'🚀',stats:'Exit Pipeline: 5 | Est. Returns: $340M',details:[['Exit Pipeline','5'],['IPO Ready','2'],['M&A Targets','3'],['Est. Proceeds','$340M']]},
  {id:'celeb-suite',name:'CELEBRITY SUITE',x:450,y:250,w:110,h:130,color:'#ea80fc',glow:'#ea80fc',icon:'⭐',stats:'Matches: 14 | Alignment Avg: 87%',details:[['Active Matches','14'],['Avg Alignment','87%'],['Warm Intros','42'],['Brand Score','9.1/10']]},
  {id:'command-center',name:'COMMAND CENTER',x:850,y:500,w:160,h:170,color:'#00e5ff',glow:'#00e5ff',icon:'🎯',stats:'System Status: OPTIMAL | Uptime: 99.7%',details:[['System Status','OPTIMAL'],['Agents Active','8'],['Tasks Today','127'],['Uptime','99.7%']]}
];
const AGENTS_CONFIG=[
  {name:'Deal Scout',emoji:'🔍',color:'#00e5ff',home:0,messages:['Found 3 Series A matches in climate tech','Scanning AngelList — 847 new listings','Cross-referencing YC W26 batch']},
  {name:'Due Diligence',emoji:'📋',color:'#b388ff',home:1,messages:['NovaTech financials: 340% YoY growth','Reference check 4/6 complete','Red flag: customer concentration 68%']},
  {name:'LP Relations',emoji:'🤝',color:'#ff4081',home:2,messages:['Q4 report sent to 12 LPs','Capital call: $12M co-invest ready','New LP onboarding: verification complete']},
  {name:'Market Intel',emoji:'📈',color:'#ffab40',home:3,messages:['AI multiples down to 2.1x from 3.8x','Fed rate decision in 48hrs','Competitor raising $500M Fund III']},
  {name:'Portfolio Ops',emoji:'⚙️',color:'#69f0ae',home:4,messages:['Burn alert: Meridian exceeding 22%','Board deck generated for 4 cos','Monthly KPIs refreshed']},
  {name:'Risk Engine',emoji:'🛡️',color:'#ff5252',home:5,messages:['Monte Carlo: 95th %ile TVPI 3.2x','Sector concentration: 34% AI','Stress test: recession scenario -18%']},
  {name:'Exit Strategy',emoji:'🚪',color:'#ffd740',home:6,messages:['IPO window open for 3 fintech cos','Secondary bid received: $45M','M&A comp: 8.2x revenue multiple']},
  {name:'Celebrity Match',emoji:'🌟',color:'#ea80fc',home:7,messages:['94% alignment score for new LP','Brand synergy report complete','3 warm intros queued']}
];
const city=document.getElementById('city');
// Stars
(function(){const c=document.getElementById('stars');for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+1;s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--o:'+(0.3+Math.random()*0.7);c.appendChild(s)}})();
// Grid
(function(){const cv=document.getElementById('iso-grid'),ctx=cv.getContext('2d');ctx.strokeStyle='rgba(0,229,255,0.06)';ctx.lineWidth=1;for(let i=-20;i<40;i++){ctx.beginPath();ctx.moveTo(i*60,0);ctx.lineTo(i*60+700,1400);ctx.stroke();ctx.beginPath();ctx.moveTo(2000-i*60,0);ctx.lineTo(2000-i*60-700,1400);ctx.stroke()}})();
// Build buildings
function addPath(svg,d,fill,stroke){const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('fill',fill);p.setAttribute('stroke',stroke);p.setAttribute('stroke-width','0.5');p.setAttribute('stroke-opacity','0.4');svg.appendChild(p)}
function createBuilding(b){
  const div=document.createElement('div');div.className='building';
  div.style.cssText='left:'+b.x+'px;top:'+b.y+'px;width:'+b.w+'px;height:'+b.h+'px;--glow:'+b.glow;
  const topW=b.w,depth=b.w*0.5,frontH=b.h;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',topW+depth);svg.setAttribute('height',frontH+depth/2);
  svg.setAttribute('viewBox','0 0 '+(topW+depth)+' '+(frontH+depth/2));svg.classList.add('iso-bldg');
  addPath(svg,'M'+topW+','+depth/2+' L'+(topW+depth)+',0 L'+(topW+depth)+','+frontH+' L'+topW+','+(frontH+depth/2)+' Z',b.color+'55',b.color);
  addPath(svg,'M0,'+depth/2+' L'+topW+','+depth/2+' L'+topW+','+(frontH+depth/2)+' L0,'+(frontH+depth/2)+' Z',b.color+'99',b.color);
  addPath(svg,'M0,'+depth/2+' L'+depth+',0 L'+(topW+depth)+',0 L'+topW+','+depth/2+' Z',b.color+'cc',b.color);
  const cols=Math.floor(topW/22),rows=Math.floor(frontH/28);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const win=document.createElementNS('http://www.w3.org/2000/svg','rect');
    win.setAttribute('x',8+c*(topW-16)/cols);win.setAttribute('y',depth/2+12+r*(frontH-20)/rows);
    win.setAttribute('width',10);win.setAttribute('height',14);win.setAttribute('rx',1);
    win.setAttribute('fill',Math.random()>.3?b.color+'88':'#ffffff22');
    win.style.animation='twinkle '+(2+Math.random()*4)+'s ease-in-out '+(Math.random()*3)+'s infinite alternate';
    svg.appendChild(win);
  }
  div.appendChild(svg);
  const icon=document.createElement('div');icon.style.cssText='position:absolute;top:'+(depth/2+10)+'px;left:50%;transform:translateX(-50%);font-size:28px;filter:drop-shadow(0 0 8px '+b.color+')';icon.textContent=b.icon;div.appendChild(icon);
  const label=document.createElement('div');label.className='label';label.textContent=b.name;div.appendChild(label);
  const stats=document.createElement('div');stats.className='stats';stats.textContent=b.stats;div.appendChild(stats);
  div.addEventListener('click',function(){showOverlay(b)});
  city.appendChild(div);
}
BUILDINGS.forEach(createBuilding);
// Paths
function drawPath(b1,b2){
  const div=document.createElement('div');div.className='path-line';
  const cx1=b1.x+b1.w/2,cy1=b1.y+b1.h/2,cx2=b2.x+b2.w/2,cy2=b2.y+b2.h/2;
  const dx=cx2-cx1,dy=cy2-cy1,len=Math.sqrt(dx*dx+dy*dy),angle=Math.atan2(dy,dx)*180/Math.PI;
  div.style.cssText='left:'+cx1+'px;top:'+cy1+'px;width:'+len+'px;transform:rotate('+angle+'deg);animation-delay:'+(Math.random()*4)+'s';
  city.appendChild(div);
}
const cc=BUILDINGS[8];BUILDINGS.forEach(function(b,i){if(i!==8)drawPath(b,cc)});
drawPath(BUILDINGS[0],BUILDINGS[1]);drawPath(BUILDINGS[2],BUILDINGS[4]);drawPath(BUILDINGS[3],BUILDINGS[5]);drawPath(BUILDINGS[6],BUILDINGS[7]);
// Agents
const agents=[];
AGENTS_CONFIG.forEach(function(cfg){
  const div=document.createElement('div');div.className='agent';div.style.setProperty('--agent-color',cfg.color);
  const body=document.createElement('div');body.className='agent-body';body.textContent=cfg.emoji;
  const name=document.createElement('div');name.className='agent-name';name.textContent=cfg.name;body.appendChild(name);div.appendChild(body);
  const bubble=document.createElement('div');bubble.className='bubble';div.appendChild(bubble);
  const tq=document.createElement('div');tq.className='task-queue';
  tq.innerHTML='<div class="tq-title">'+cfg.name+' — Task Queue</div>'+cfg.messages.map(function(m){return '<div class="tq-item">'+m+'</div>'}).join('');
  div.appendChild(tq);
  const home=BUILDINGS[cfg.home];const sx=home.x+home.w/2-14,sy=home.y+home.h/2-14;
  div.style.left=sx+'px';div.style.top=sy+'px';
  city.appendChild(div);
  agents.push({el:div,bubble:bubble,cfg:cfg,msgIdx:0,x:sx,y:sy,targetX:sx,targetY:sy,moving:false});
});
// Agent movement
function moveAgent(a){
  var t=BUILDINGS[Math.floor(Math.random()*BUILDINGS.length)];
  a.targetX=t.x+t.w/2-14+(Math.random()*30-15);a.targetY=t.y+t.h/2-14+(Math.random()*30-15);a.moving=true;
}
function updateAgents(){
  agents.forEach(function(a){
    if(a.moving){var dx=a.targetX-a.x,dy=a.targetY-a.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<3){a.moving=false;a.x=a.targetX;a.y=a.targetY}
      else{a.x+=dx/dist*1.2;a.y+=dy/dist*1.2}
      a.el.style.left=a.x+'px';a.el.style.top=a.y+'px'}
  });requestAnimationFrame(updateAgents);
}
updateAgents();
setInterval(function(){agents.forEach(function(a){if(!a.moving&&Math.random()>.3)moveAgent(a)})},3000);
// Bubbles
setInterval(function(){agents.forEach(function(a){
  a.bubble.classList.remove('active');
  setTimeout(function(){a.bubble.textContent=a.cfg.messages[a.msgIdx];a.msgIdx=(a.msgIdx+1)%a.cfg.messages.length;a.bubble.classList.add('active')},300);
})},4500);
setTimeout(function(){agents.forEach(function(a){a.bubble.textContent=a.cfg.messages[0];a.bubble.classList.add('active')})},500);
// Particles
function spawnParticle(){
  var b1=BUILDINGS[Math.floor(Math.random()*BUILDINGS.length)],b2=BUILDINGS[Math.floor(Math.random()*BUILDINGS.length)];
  if(b1===b2)return;var p=document.createElement('div');p.className='particle';
  var colors=['#00e5ff','#b388ff','#69f0ae','#ffab40','#ff4081'];p.style.background=colors[Math.floor(Math.random()*colors.length)];
  p.style.boxShadow='0 0 6px '+p.style.background;
  var sx=b1.x+b1.w/2,sy=b1.y+b1.h/2,ex=b2.x+b2.w/2,ey=b2.y+b2.h/2;
  p.style.left=sx+'px';p.style.top=sy+'px';city.appendChild(p);
  var dur=2000+Math.random()*2000,start=performance.now();
  function animate(t){var prog=Math.min((t-start)/dur,1),ease=prog<.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;
    p.style.left=(sx+(ex-sx)*ease)+'px';p.style.top=(sy+(ey-sy)*ease)+'px';
    p.style.opacity=prog<.1?prog*10:prog>.9?(1-prog)*10:0.6;
    if(prog<1)requestAnimationFrame(animate);else p.remove()}
  requestAnimationFrame(animate);
}
setInterval(spawnParticle,400);
// Drones
function spawnDrone(){
  var d=document.createElement('div');d.className='drone';var db=document.createElement('div');db.className='drone-body';d.appendChild(db);
  var b1=BUILDINGS[Math.floor(Math.random()*BUILDINGS.length)],b2=BUILDINGS[Math.floor(Math.random()*BUILDINGS.length)];
  if(b1===b2)return;var sx=b1.x+b1.w/2,sy=b1.y-20,ex=b2.x+b2.w/2,ey=b2.y-20;
  d.style.left=sx+'px';d.style.top=sy+'px';city.appendChild(d);
  var dur=3000+Math.random()*3000,start=performance.now();
  function anim(t){var p=Math.min((t-start)/dur,1),yOff=Math.sin(p*Math.PI)*-40;
    d.style.left=(sx+(ex-sx)*p)+'px';d.style.top=(sy+(ey-sy)*p+yOff)+'px';
    if(p<1)requestAnimationFrame(anim);else d.remove()}
  requestAnimationFrame(anim);
}
setInterval(spawnDrone,2500);

var logIdx=0,logEl=document.getElementById('log-entries');
function addLogEntry(){
  var entry=LOG_MESSAGES[logIdx%LOG_MESSAGES.length],now=new Date();
  var time=now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'});
  var div=document.createElement('div');div.className='log-entry';
  div.innerHTML='<span class="log-time">'+time+'</span><span class="log-agent">'+entry.agent+'</span> '+entry.msg;
  logEl.insertBefore(div,logEl.firstChild);if(logEl.children.length>5)logEl.removeChild(logEl.lastChild);logIdx++;
}

// Overlay
function showOverlay(b){
  document.getElementById('overlay').classList.add('show');
  document.getElementById('overlay-title').textContent=b.icon+' '+b.name;
  document.getElementById('overlay-card').style.borderColor=b.color;
  document.getElementById('overlay-title').style.color=b.color;
  var html='';b.details.forEach(function(d){html+='<div class="detail-row"><span class="detail-label">'+d[0]+'</span><span class="detail-val" style="color:'+b.color+'">'+d[1]+'</span></div>'});
  document.getElementById('overlay-body').innerHTML=html;
}
function closeOverlay(){document.getElementById('overlay').classList.remove('show')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeOverlay()});
// Pan
var isDragging=false,dragStartX,dragStartY,offsetX=0,offsetY=0;
var wrap=document.getElementById('city-wrap');
wrap.addEventListener('mousedown',function(e){isDragging=true;dragStartX=e.pageX-offsetX;dragStartY=e.pageY-offsetY;wrap.style.cursor='grabbing'});
window.addEventListener('mousemove',function(e){if(!isDragging)return;offsetX=e.pageX-dragStartX;offsetY=e.pageY-dragStartY;city.style.transform='translate(calc(-50% + '+offsetX+'px), calc(-50% + '+offsetY+'px))'});
window.addEventListener('mouseup',function(){isDragging=false;wrap.style.cursor='grab'});
wrap.style.cursor='grab';
